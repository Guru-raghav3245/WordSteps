name: word_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.1.1+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  confetti: ^0.8.0
  cupertino_icons: ^1.0.6
  english_words: ^4.0.0
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^20.1.0
  flutter_native_splash: ^2.3.7
  flutter_riverpod: ^3.3.1
  flutter_tts: ^4.2.5
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path_provider: ^2.1.2
  pdf: ^3.11.3
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  shared_preferences: ^2.2.2
  speech_to_text: ^7.3.0
  string_similarity: ^2.1.1
  timezone: ^0.10.1
  url_launcher: ^6.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Already compatible
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Icon2.png
    - assets/Icon_HomePage.png

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/Icon2.png"
  min_sdk_android: 21 

flutter_native_splash:
  color: "#ffffff" 
  image: assets/Icon2.png
  image_dark: assets/Icon2.png
  android_12:
    image: assets/Icon2.png
    image_dark: assets/Icon2.png
  ios: true
  android: true
  fullscreen: true